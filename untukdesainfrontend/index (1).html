<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kaspa Space — Ruang Kerja Masa Depan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Stylesheets (all in src/) -->
  <link rel="stylesheet" href="src/styles.css" />
  <link rel="stylesheet" href="src/coworking.css" />
  <link rel="stylesheet" href="src/packages.css" />
  <link rel="stylesheet" href="src/business-service.css" />
  <link rel="stylesheet" href="src/commerce.css" />
  <link rel="stylesheet" href="src/pages.css" />
  <link rel="stylesheet" href="src/auth-fnb.css" />
  <link rel="stylesheet" href="src/admin.css" />
  <link rel="stylesheet" href="src/account.css" />
  <link rel="stylesheet" href="src/invoice.css" />
  <link rel="stylesheet" href="src/media.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Client-side stores: cart + session -->
  <script type="text/babel" src="src/store.jsx"></script>

  <!-- Shared building blocks: Icon, Nav, Hero, sections, Footer -->
  <script type="text/babel" src="src/components-1.jsx"></script>
  <script type="text/babel" src="src/components-2.jsx"></script>
  <script type="text/babel" src="src/components-3.jsx"></script>
  <script type="text/babel" src="src/cart-ui.jsx"></script>
  <script type="text/babel" src="src/legal.jsx"></script>

  <!-- Data + product libraries -->
  <script type="text/babel" src="src/admin-data.jsx"></script>
  <script type="text/babel" src="src/media-data.jsx"></script>
  <script type="text/babel" src="src/packages.jsx"></script>
  <script type="text/babel" src="src/coworking-1.jsx"></script>
  <script type="text/babel" src="src/coworking-2.jsx"></script>
  <script type="text/babel" src="src/about.jsx"></script>
  <script type="text/babel" src="src/fnb.jsx"></script>
  <script type="text/babel" src="src/contact.jsx"></script>
  <script type="text/babel" src="src/admin-rooms.jsx"></script>
  <script type="text/babel" src="src/catalog.jsx"></script>

  <!-- Pages (each registers into window.KaspaPages) -->
  <script type="text/babel" src="src/app.jsx"></script>
  <script type="text/babel" src="src/about-app.jsx"></script>
  <script type="text/babel" src="src/coworking-app.jsx"></script>
  <script type="text/babel" src="src/fnb-app.jsx"></script>
  <script type="text/babel" src="src/business-service.jsx"></script>
  <script type="text/babel" src="src/product-detail.jsx"></script>
  <script type="text/babel" src="src/checkout.jsx"></script>
  <script type="text/babel" src="src/payment.jsx"></script>
  <script type="text/babel" src="src/order-success.jsx"></script>
  <script type="text/babel" src="src/invoice.jsx"></script>
  <script type="text/babel" src="src/media.jsx"></script>
  <script type="text/babel" src="src/article.jsx"></script>
  <script type="text/babel" src="src/contact-app.jsx"></script>
  <script type="text/babel" src="src/auth.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/admin-app.jsx"></script>

  <!-- Hash router: renders the right page into #root -->
  <script type="text/babel">
    (function () {
      const PAGE_FOR = {
        home: "home", about: "about", coworking: "coworking", fnb: "fnb",
        business: "business", product: "business", checkout: "business",
        payment: "business", success: "business", auth: "auth",
        contact: "contact", admin: "admin", dashboard: "dashboard",
        invoice: "business", media: "media", article: "media",
      };
      const root = ReactDOM.createRoot(document.getElementById("root"));
      let current = null;

      function parseRoute() {
        const h = window.location.hash || "";
        if (!h.startsWith("#/")) return null;         // in-page anchor → ignore
        const seg = h.slice(2).split(/[/?#]/)[0];
        return seg || "home";
      }

      function render() {
        const pages = window.KaspaPages || {};
        let route = parseRoute();
        if (route === null) {
          if (current) return;                        // keep page, let anchor scroll
          route = "home";
        }
        if (!pages[route]) route = "home";
        current = route;
        window.__PAGE = PAGE_FOR[route] || route;
        document.body.className = route === "admin" ? "admin-body" : "";
        root.render(React.createElement(pages[route]));
        window.scrollTo(0, 0);
      }

      window.addEventListener("hashchange", render);
      if (!window.location.hash || !window.location.hash.startsWith("#/")) {
        history.replaceState(null, "", "#/home");
      }
      render();
    })();
  </script>
</body>
</html>
